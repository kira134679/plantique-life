<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>%VITE_FULL_TITLE%</title>
    <!-- Facebook meta tags -->
    <meta property="og:title" content="%VITE_FULL_TITLE%" />
    <meta property="og:url" content="%VITE_GH_PAGES_BASE_URL%%VITE_REPO%" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="結合美感與療癒的多肉植物電商平台。" />
    <meta property="og:image" content="%VITE_GH_PAGES_BASE_URL%%VITE_REPO%%VITE_OG_IMAGE%" />
    <!-- X(Twitter) meta tags -->
    <meta name="twitter:title" content="%VITE_FULL_TITLE%" />
    <meta name="twitter:url" content="%VITE_GH_PAGES_BASE_URL%%VITE_REPO%" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:description" content="結合美感與療癒的多肉植物電商平台。" />
    <meta name="twitter:image" content="%VITE_GH_PAGES_BASE_URL%%VITE_REPO%%VITE_OG_IMAGE%" />
    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "%VITE_FULL_TITLE%",
        "description": "結合美感與療癒的多肉植物電商平台。",
        "image": "%VITE_GH_PAGES_BASE_URL%%VITE_REPO%%VITE_OG_IMAGE%",
        "logo": "%VITE_GH_PAGES_BASE_URL%%VITE_REPO%%VITE_FAVICON%"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
